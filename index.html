<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Paws Pet Shop</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand" href="#">Happy Paws</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="#">Home</a></li>
<li class="nav-item"><a class="nav-link" href="#">Products</a></li>
<li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
</ul>
</div>
</div>
</nav>

<!-- Hero -->
<section class="bg-primary text-white text-center p-5">
<div class="container">
<h1>Welcome to Happy Paws</h1>
<p>Your trusted pet shop for dogs and cats</p>
<button class="btn btn-light">Shop Now</button>
</div>
</section>

<!-- Products -->
<section class="container my-5">
<h2 class="text-center mb-4">Our Products</h2>

<div class="row">

<div class="col-md-4">
<div class="card">
<img src="dogfood.jpg" class="card-img-top">
<div class="card-body">
<h5>Dog Food</h5>
<p>Healthy food for your dogs.</p>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card">
<img src="cat.jpg" class="card-img-top">
<div class="card-body">
<h5>Cat Toys</h5>
<p>Fun toys for playful cats.</p>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card">
<img src="pet.webp" class="card-img-top">
<div class="card-body">
<h5>Pet Accessories</h5>
<p>Collars, beds, and more.</p>
</div>
</div>
</div>

</div>
</section>

<!-- Footer -->
<footer class="bg-dark text-white text-center p-3">
<p>© 2026 Happy Paws Pet Shop</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
